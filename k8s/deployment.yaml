apiVersion: apps/v1
kind: Deployment
metadata:
  name: mmos-rmq-poc
  labels:
    app: mmos-rmq-poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mmos-rmq-poc
  template:
    metadata:
      labels:
        app: mmos-rmq-poc
    spec:
      containers:
        - name: app
          image: ghcr.io/glueops/mmos-rmq-poc:main
          imagePullPolicy: Always
          env:
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: url
            - name: RABBITMQ_QUEUE
              value: mmos.events
            - name: HTTP_ADDR
              value: ":8080"
            - name: CONSUMER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - containerPort: 8080
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
